<!DOCTYPE html>
<html lang="en">
	<head style="margin: 0px;">
		<title>M-LIB </title>	
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" type="text/css" href="static/style/augmented-ui.min.css">
		<link rel="stylesheet"  href="static/style/style.css">
		<link rel="stylesheet"  href="static/style/pageDesign.css">
		<link rel="stylesheet"  href="static/style/styleDisplay.css">
	</head>

	<body class="pageBackground" >
		<div class="pageBase" >
			<div class="texturePageBackgroundHat">
				<div class="for_TexturePageBackgroundHat">
					<p class="logofont"><span style="color: chocolate;">M</span>-LIB</p>
					<p class="logofont1">ARTICLE STORAGE </p>
				</div>	
			</div>
			<div id="toolbar" class="bar">
					<script>
						let path = 'static/items/toolbar.html';
						fetch(path)
						.then(response => response.text())
						.then(html => {
						const container = document.getElementById('toolbar');
						container.innerHTML = html;
						container.querySelectorAll('script').forEach(oldScript => {
						const newScript = document.createElement('script');
						// Копируем атрибуты и содержимое
						if (oldScript.src) {
							newScript.src = oldScript.src;
						} else {
							newScript.textContent = oldScript.textContent;
						}
						// Копируем другие атрибуты
						Array.from(oldScript.attributes).forEach(attr => {
							newScript.setAttribute(attr.name, attr.value);
						});
						oldScript.parentNode.replaceChild(newScript, oldScript);
						});});
					</script>
		</div>
			<div id="two" class="two">
				<div class="content">
					<div class="contentHat">
						<p class= "Title_2">Welcome</p>	
					</div>
					<div class="panel" data-augmented-ui=" br-clip both">
						<script>
							fetch('static/articles/welcome.html')
							.then(response => response.text())
							.then(html => document.getElementById('content').innerHTML = html);
						</script>
					<div id="content" style="margin-top: 30px;"></div>
					</div>
				</div>
			</div>

			<div class="bar">
				<div class="decoration"></div>
				<p class="buttonToolBar">Data-Noise || 2025</p>
			</div>
		</div>
	</body>
</html>
