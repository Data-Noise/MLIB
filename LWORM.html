		<div id="cipher" class="cipher" style="position: absolute;
			height: 100px;width: 265px;
			right: 0; 
			
			margin-right:200px; 
			margin-left:200px; 
			margin-top: 20px;
			background-color: rgba(137, 43, 226, 0);
			background-image: url(static/style/cipher.png);
			background-size:cover;
			pointer-events: none;
			opacity: 0.4;
			image-rendering: pixelated;
			"></div>	
			<script>
				const object = document.getElementById('cipher');
				let value = 0;
				let x = 1;
				let y_ = 0;
				let ranX = 0.0;
				object.style.left = 1;
				    setInterval(() => {
						x = x + 1;
						if (x>3)
						{
							y_ = Math.random();
							ranX = Math.random();
							let c = String(1000*y_ + "px");
							if (y_ > 0.5) 
							{
								object.style.left = String(100*ranX +"px");
					
								object.style.right = "auto";
								//console.log("left: " + y_);
							}
							else
							{
								object.style.right = String(100*ranX +"px"); 
								object.style.left = "auto";
								//console.log("right: " +y_);
							}							
							object.style.marginTop = c;
							//object.style.opacity = 0.5;
							//console.log(y_);
							x = 0;
						}
        			}, 5); // Меняет цвет каждую секунду
			</script>

		<div id="toolbar" class="bar" style="
		display: flex;

		margin-right: auto;

		">
				<script>
					let path1 = 'static/items/toolbar.html';
					fetch(path1)
					.then(response => response.text())
					.then(html => {
						//document.getElementById('toolbar').innerHTML = html;
					const container = document.getElementById('toolbar');
    				container.innerHTML = html;
					container.querySelectorAll('script').forEach(oldScript => {
					const newScript = document.createElement('script');
					// Копируем атрибуты и содержимое
					if (oldScript.src) {
						newScript.src = oldScript.src;
					} else {
						newScript.textContent = oldScript.textContent;
					}
					// Копируем другие атрибуты
					Array.from(oldScript.attributes).forEach(attr => {
						newScript.setAttribute(attr.name, attr.value);
					});
					oldScript.parentNode.replaceChild(newScript, oldScript);
					});});
				</script>

	</div>
