<body class="pageBackground" >
<div class="pageBase" >
			<div class="texturePageBackgroundHat">

					<p class="logofont1">ARTICLE STORAGE </p>
				</div>

		<div id="toolbar" class="bar">
							<script>
					let path1 = '../items/toolbar.html';
					fetch(path1)
					.then(response => response.text())
					.then(html => {
						//document.getElementById('toolbar').innerHTML = html;
					const container = document.getElementById('toolbar');
    				container.innerHTML = html;
					container.querySelectorAll('script').forEach(oldScript => {
					const newScript = document.createElement('script');
					// Копируем атрибуты и содержимое
					if (oldScript.src) {
						newScript.src = oldScript.src;
					} else {
						newScript.textContent = oldScript.textContent;
					}
					// Копируем другие атрибуты
					Array.from(oldScript.attributes).forEach(attr => {
						newScript.setAttribute(attr.name, attr.value);
					});
					oldScript.parentNode.replaceChild(newScript, oldScript);
					});});
				</script>

	</div>
		
	<div id="two" class="two">
	

			<div class="content">
				<div class="contentHat">
				<div id="articleName" class= "Title_2">Article: [name]</div>	
			</div>
